<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VR360 Admin - Quản trị</title>

  <!-- Leaflet (cho LocationManager) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <!-- Pannellum (cho VR Preview + Hotspot Editor) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">

  <!-- App Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <!-- ==================== LOGIN ==================== -->
  <div id="login-view">
    <div class="login-container">
      <div class="login-card">
        <h1>VR360 Admin</h1>
        <p>Đăng nhập để quản trị hệ thống</p>
        <form id="login-form">
          <div class="form-group">
            <label for="username">Tài khoản</label>
            <input type="text" id="username" name="username" required placeholder="Nhập tài khoản">
          </div>
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" name="password" required placeholder="Nhập mật khẩu">
          </div>
          <button type="submit" class="btn-login">Đăng nhập</button>
          <p id="login-error" class="error-text hidden"></p>
        </form>
      </div>
    </div>
  </div>

  <!-- ==================== ADMIN PANEL ==================== -->
  <div id="admin-panel" class="hidden">
    <header class="admin-header">
      <div class="admin-header-left">
        <h1>VR360 Admin</h1>
      </div>
      <div class="admin-header-right">
        <span id="admin-name">Xin chào, Admin</span>
        <a href="index.html" class="btn-view-site">Xem website</a>
        <button id="btn-logout" class="btn-logout">Đăng xuất</button>
      </div>
    </header>

    <div class="admin-body">
      <aside class="admin-sidebar">
        <nav class="admin-nav">
          <a href="#" class="nav-item active" data-page="dashboard">📊 Dashboard</a>
          <a href="#" class="nav-item" data-page="tours">🗺️ Tours</a>
          <a href="#" class="nav-item" data-page="locations">📍 Khu vực</a>
          <a href="#" class="nav-item" data-page="scenes">🖼️ Scenes</a>
          <a href="#" class="nav-item" data-page="hotspots">🔘 Hotspots</a>
          <a href="#" class="nav-item" data-page="preview">👁️ Xem trước</a>
        </nav>
      </aside>

      <main class="admin-content" id="admin-content">
        <!-- Nội dung được render bởi JS -->
      </main>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <script src="js/utils/constants.js"></script>
  <script src="js/utils/helpers.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin/AdminApp.js"></script>
  <script src="js/admin/Dashboard.js"></script>
  <script src="js/admin/TourManager.js"></script>
  <script src="js/admin/LocationManager.js"></script>
  <script src="js/admin/SceneManager.js"></script>
  <script src="js/admin/HotspotEditor.js"></script>
  <script src="js/admin/VRPreview.js"></script>
</body>
</html>
